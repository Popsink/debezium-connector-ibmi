name: Publish Release to GCP Artifact Registry

on:
  pull_request:
    types:
      - closed
    # Matches release branches like 3.4, 2.7, etc. (single-digit major.minor)
    branches:
      - '[0-9].[0-9]'
    paths-ignore:
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout connector
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed to fetch all tags for version collision detection
          path: ibmi

      - name: Compute release version
        id: version
        run: |
          DEBEZIUM_VERSION=$(sed -n 's/.*<version\.debezium>\(.*\)<\/version\.debezium>.*/\1/p' ibmi/pom.xml | head -1 | sed 's/-SNAPSHOT//')
          DATE=$(date +%Y.%m.%d)
          BASE_VERSION="${DEBEZIUM_VERSION}-ppsk-${DATE}"

          # Find the next available version by checking existing git tags.
          # If v3.4.2-ppsk-2026.03.17 is taken, try v3.4.2-ppsk-2026.03.17-1, etc.
          VERSION="${BASE_VERSION}"
          COUNTER=0
          while git -C ibmi tag -l "v${VERSION}" | grep -q .; do
            COUNTER=$((COUNTER + 1))
            VERSION="${BASE_VERSION}-${COUNTER}"
          done

          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout debezium core
        uses: actions/checkout@v4
        with:
          repository: debezium/debezium
          ref: ${{ github.base_ref || github.ref_name }}
          path: core

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install debezium core
        run: |
          ./ibmi/mvnw clean install \
            -f core/pom.xml \
            -pl debezium-bom,debezium-core,debezium-embedded,debezium-storage,debezium-assembly-descriptors \
            -am \
            -DskipTests \
            -DskipITs \
            -Dformat.formatter.goal=validate \
            -Dformat.imports.goal=check \
            -Dhttp.keepAlive=false \
            -Dmaven.wagon.http.pool=false \
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

      - name: Set version in pom.xml files
        run: |
          ./ibmi/mvnw versions:set \
            -f ibmi/pom.xml \
            -DnewVersion=${{ steps.version.outputs.version }} \
            -DgenerateBackupPoms=false \
            -DprocessAllModules=true

      - name: Deploy release to GCP Artifact Registry
        run: |
          ./ibmi/mvnw deploy \
            -f ibmi/pom.xml \
            -Pgcloud \
            -DskipTests \
            -DskipITs \
            -Dhttp.keepAlive=false \
            -Dmaven.wagon.http.pool=false \
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

      - name: Create and push release tag
        run: |
          git -C ibmi config user.name "github-actions[bot]"
          git -C ibmi config user.email "github-actions[bot]@users.noreply.github.com"
          git -C ibmi tag "v${{ steps.version.outputs.version }}"
          git -C ibmi push origin "v${{ steps.version.outputs.version }}"
