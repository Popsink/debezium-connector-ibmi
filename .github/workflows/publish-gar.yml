name: Publish to GCP Artifact Registry

on:
  push:
    branches:
      - main
      - 1.*
      - 2.*
      - 3.*
      - 4.*
    paths-ignore:
      - '*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout debezium core
        uses: actions/checkout@v4
        with:
          repository: debezium/debezium
          ref: ${{ github.ref }}
          path: core

      - name: Checkout connector
        uses: actions/checkout@v4
        with:
          path: ibmi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install debezium core
        run: |
          ./ibmi/mvnw clean install \
            -f core/pom.xml \
            -pl debezium-bom,debezium-core,debezium-embedded,debezium-storage,debezium-assembly-descriptors \
            -am \
            -DskipTests \
            -DskipITs \
            -Dformat.formatter.goal=validate \
            -Dformat.imports.goal=check \
            -Dhttp.keepAlive=false \
            -Dmaven.wagon.http.pool=false \
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

      - name: Deploy to GCP Artifact Registry
        run: |
          ./ibmi/mvnw deploy \
            -f ibmi/pom.xml \
            -Pgcloud \
            -DskipTests \
            -DskipITs \
            -Dhttp.keepAlive=false \
            -Dmaven.wagon.http.pool=false \
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120
