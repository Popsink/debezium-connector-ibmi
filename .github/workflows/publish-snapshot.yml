name: Publish Snapshot to GCP Artifact Registry

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths-ignore:
      - '*.md'
  workflow_dispatch:

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout connector
        uses: actions/checkout@v4
        with:
          path: ibmi

      - name: Compute snapshot version
        id: version
        run: |
          DEBEZIUM_VERSION=$(sed -n 's/.*<version\.debezium>\(.*\)<\/version\.debezium>.*/\1/p' ibmi/pom.xml | head -1 | sed 's/-SNAPSHOT//')
          DATE=$(date +%Y.%m.%d)
          VERSION="${DEBEZIUM_VERSION}-ppsk-${DATE}-SNAPSHOT"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set version in pom.xml files
        run: |
          ./ibmi/mvnw versions:set \
            -f ibmi/pom.xml \
            -DnewVersion=${{ steps.version.outputs.version }} \
            -DgenerateBackupPoms=false

      - name: Checkout debezium core
        uses: actions/checkout@v4
        with:
          repository: debezium/debezium
          ref: main
          path: core

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install debezium core
        run: |
          ./ibmi/mvnw clean install \
            -f core/pom.xml \
            -pl debezium-bom,debezium-core,debezium-embedded,debezium-storage,debezium-assembly-descriptors \
            -am \
            -DskipTests \
            -DskipITs \
            -Dformat.formatter.goal=validate \
            -Dformat.imports.goal=check \
            -Dhttp.keepAlive=false \
            -Dmaven.wagon.http.pool=false \
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

      - name: Deploy snapshot to GCP Artifact Registry
        run: |
          ./ibmi/mvnw deploy \
            -f ibmi/pom.xml \
            -Pgcloud \
            -DskipTests \
            -DskipITs \
            -Dhttp.keepAlive=false \
            -Dmaven.wagon.http.pool=false \
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120
